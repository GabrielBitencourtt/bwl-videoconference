services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_rooms
    ports: ["5432:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
      - ../backend/app/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d video_rooms"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]

  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    ports: ["7880:7880", "7881:7881", "7882:7882/udp"]

  backend:
    build: ../backend
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      livekit:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/video_rooms
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ws://localhost:7880        # client-facing: must be reachable from the browser
      LIVEKIT_HOST_URL: http://livekit:7880   # server-side REST: internal docker network
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: recordings
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_PUBLIC_BASE: http://localhost:9000/recordings
      RECORDING_VIEW_BASE_URL: http://frontend:5173/recording-view
      CORS_ORIGINS: "*"
    ports: ["8000:8000"]

  frontend:
    build: ../frontend
    depends_on: [backend]
    environment:
      VITE_API_BASE: http://localhost:8000
      VITE_WS_BASE: ws://localhost:8000
    ports: ["5173:5173"]

volumes:
  db_data:
  minio_data:
